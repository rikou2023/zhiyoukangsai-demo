/* tokens.css */
/* 智优康赛设计令牌
   单一来源 — 颜色 / 字体 / 间距 / 圆角 / 动效
   依据 ui-ux-pro-max 数据 + frontend/ui_design.md 规范
*/

:root {
  /* ===== 共享变量（与配色无关） ===== */
  /* 状态色 */
  --success:       #22C55E;
  --warning:       #F59E0B;
  --danger:        #EF4444;

  /* ===== 字体 ===== */
  --font-sans: "HarmonyOS Sans SC", "MiSans", "PingFang SC", "Microsoft YaHei", system-ui, -apple-system, sans-serif;
  --font-serif: "Source Han Serif SC", "Noto Serif SC", "Songti SC", "STSong", serif;
  --font-mono: "JetBrains Mono", "SF Mono", "Consolas", "Menlo", monospace;

  /* 字号比例（4px 步长） */
  --text-xs:    12px;
  --text-sm:    14px;
  --text-base:  16px;
  --text-lg:    18px;
  --text-xl:    20px;
  --text-2xl:   24px;
  --text-3xl:   32px;
  --text-4xl:   40px;
  --text-5xl:   56px;
  --text-6xl:   72px;
  --text-hero:  clamp(40px, 6vw, 88px);

  /* 行高 */
  --leading-tight: 1.2;
  --leading-snug:  1.35;
  --leading-base:  1.6;

  /* 字重 */
  --weight-regular: 400;
  --weight-medium:  500;
  --weight-semibold: 600;
  --weight-bold:    700;

  /* ===== 间距（8px 基数） ===== */
  --space-1:  4px;
  --space-2:  8px;
  --space-3:  12px;
  --space-4:  16px;
  --space-5:  24px;
  --space-6:  32px;
  --space-7:  48px;
  --space-8:  64px;
  --space-9:  96px;
  --space-10: 128px;

  /* ===== 圆角（最大 16px） ===== */
  --radius-sm:  4px;
  --radius:     8px;
  --radius-md:  12px;
  --radius-lg:  16px;
  --radius-full: 999px;

  /* ===== 动效（不超过 300ms） ===== */
  --ease:       cubic-bezier(0.4, 0, 0.2, 1);
  --ease-out:   cubic-bezier(0, 0, 0.2, 1);
  --duration-fast:  150ms;
  --duration:       200ms;
  --duration-slow:  300ms;

  /* ===== 布局 ===== */
  --container: 1240px;
  --header-height: 72px;

  /* ===== 阴影（功能性，不装饰） ===== */
  --shadow-sm: 0 1px 2px rgba(0, 0, 0, 0.4);
  --shadow:    0 4px 12px rgba(0, 0, 0, 0.32);
  --shadow-lg: 0 12px 32px rgba(0, 0, 0, 0.4);

  /* z-index 层级 */
  --z-base:    1;
  --z-sticky:  10;
  --z-header:  20;
  --z-overlay: 30;
  --z-modal:   50;
}

/* ============================================
   配色主题 — A B C D E 五套
   切换：在 <html> 上设置 data-theme="A"
   ============================================ */

/* A · Logo 原生配色（直接取自智优康赛 Logo） — 客户"按 Logo 来"的最忠实方案 */
:root,
[data-theme="A"] {
  --bg-base:       #050A14;    /* 极深版 Logo 蓝 */
  --bg-surface:    #0B1525;
  --bg-elevated:   #14223A;
  --brand:         #036EB8;    /* Logo 主蓝（汉字色） */
  --brand-hover:   #1E8AD0;
  --accent:        #2EA7E0;    /* Logo 渐变浅蓝端 */
  --accent-hover:  #5BBCEA;
  --cta:           #C30D23;    /* Logo 朱砂红（两个点睛圆点的色） */
  --cta-hover:     #DC2C42;
  --cta-text:      #FFFFFF;
  --text:          #F5F8FC;
  --text-muted:    #94A8C2;
  --text-dim:      #5B6F88;
  --border:        #14223A;
  --border-strong: #1F3454;
  --grad-from:     #2EA7E0;    /* Logo 自带渐变：浅蓝 */
  --grad-mid:      #036EB8;    /* Logo 主蓝 */
  --grad-to:       #172A88;    /* Logo 自带渐变：深蓝 */
}

/* B · Linear / Vercel 工程师感 — 黑底 + 电光绿 + 白按钮 */
[data-theme="B"] {
  --bg-base:       #08090A;
  --bg-surface:    #131316;
  --bg-elevated:   #1A1A1F;
  --brand:         #FAFAFA;
  --brand-hover:   #FFFFFF;
  --accent:        #4ADE80;
  --accent-hover:  #86EFAC;
  --cta:           #FAFAFA;
  --cta-hover:     #E5E5E5;
  --cta-text:      #08090A;
  --text:          #F4F4F5;
  --text-muted:    #A1A1AA;
  --text-dim:      #71717A;
  --border:        #27272A;
  --border-strong: #3F3F46;
  --grad-from:     #86EFAC;
  --grad-mid:      #4ADE80;
  --grad-to:       #22C55E;
}

/* C · Anthropic 暖橘 — 反 AI 套版的学院派 */
[data-theme="C"] {
  --bg-base:       #0D0D0D;
  --bg-surface:    #1A1A1A;
  --bg-elevated:   #262626;
  --brand:         #D97757;
  --brand-hover:   #E58869;
  --accent:        #8B5CF6;
  --accent-hover:  #A78BFA;

  --cta-hover:     #E58869;

/* D · Stripe Enterprise 深蓝紫 — 头部 KA 高大上感 */

  --border-strong: #2A4A78;
  --grad-from:     #00D4FF;
  --grad-mid:      #635BFF;
  --grad-to:       #A78BFA;
}

/* E · 中国 AI 风（雾灰墨青 + 朱砂橙）— 国央企信任锚 */
[data-theme="E"] {
  --bg-base:       #0B1015;
  --bg-surface:    #161E27;
  --bg-elevated:   #1F2A36;
  --brand:         #E8E6E1;
  --brand-hover:   #F5F3EE;
  --accent:        #00C7B7;
  --accent-hover:  #2DD4BF;
  --cta:           #FF7A45;
  --cta-hover:     #FF9468;
  --cta-text:      #0B1015;
  --text:          #F1EFE9;
  --text-muted:    #9CA3AF;
  --text-dim:      #6B7280;
  --border:        #1F2A36;
  --border-strong: #374151;
  --grad-from:     #00C7B7;
  --grad-mid:      #2DD4BF;
  --grad-to:       #FF7A45;
}

/* M · 干净电光蓝 — 深海军 + 单色电蓝（客户参考图同款，极简科技感） */
[data-theme="M"] {
  --bg-base:       #0A1428;
  --bg-surface:    #142036;
  --bg-elevated:   #1A2A47;
  --brand:         #2F66FF;
  --brand-hover:   #4F7FFF;
  --accent:        #2F66FF;
  --accent-hover:  #6B9BFF;
  --cta:           #2F66FF;
  --cta-hover:     #4F7FFF;
  --cta-text:      #FFFFFF;
  --text:          #FFFFFF;
  --text-muted:    #8B96AD;
  --text-dim:      #5C6680;
  --border:        #1B2A47;
  --border-strong: #2D3D62;
  --grad-from:     #6B9BFF;
  --grad-mid:      #2F66FF;

/* 减少动效偏好 */
@media (prefers-reduced-motion: reduce) {
  *, *::before, *::after {
    animation-duration: 0.01ms !important;
    animation-iteration-count: 1 !important;
    transition-duration: 0.01ms !important;
  }
}

/* ===== 基础 reset + 全站默认 ===== */
*, *::before, *::after { box-sizing: border-box; }

html {
  scroll-behavior: smooth;
  -webkit-text-size-adjust: 100%;
}

body {
  margin: 0;
  background: var(--bg-base);
  color: var(--text);
  font-family: var(--font-sans);
  font-size: var(--text-base);
  line-height: var(--leading-base);
  font-weight: var(--weight-regular);
  -webkit-font-smoothing: antialiased;
  -moz-osx-font-smoothing: grayscale;
  overflow-x: hidden;
}

a { color: inherit; text-decoration: none; }
button { font: inherit; cursor: pointer; }
img, svg { display: block; max-width: 100%; }

::selection {
  background: var(--accent);
  color: var(--bg-base);
}

/* 容器 */
.container {
  width: 100%;
  max-width: var(--container);
  margin: 0 auto;
  padding: 0 var(--space-5);
}

@media (min-width: 768px) {
  .container { padding: 0 var(--space-6); }
}


/* index.css */
/* 首页样式 - 智优康赛
   依赖 tokens.css
   设计风格：Minimalism + Hero-Centric + Trust & Authority
*/

/* ===========================================
   Header 顶栏
   =========================================== */
.site-header {
  position: fixed;
  top: 0;
  left: 0;
  right: 0;
  height: var(--header-height);
  z-index: var(--z-header);
  display: flex;
  align-items: center;
  background: transparent;
  border-bottom: 1px solid transparent;
  transition: background var(--duration) var(--ease),
              border-color var(--duration) var(--ease);
}

.site-header.scrolled {
  background: rgba(10, 15, 26, 0.85);
  backdrop-filter: blur(16px);
  border-bottom-color: var(--border);
}

.site-header .container {
  display: flex;
  align-items: center;
  justify-content: space-between;
  gap: var(--space-5);
}

.brand {
  display: flex;
  align-items: center;
  flex-shrink: 0;
}

.brand img {
  height: 44px;  /* 客户要求 Logo 放大 */
  width: auto;
}

.main-nav {
  display: flex;
  align-items: center;
  gap: var(--space-2);
  margin: 0 auto;
}

.main-nav a {
  color: #FFFFFF;
  padding: var(--space-2) var(--space-4);
  font-size: var(--text-base);
  font-weight: var(--weight-semibold);
  letter-spacing: 0.01em;
  border-radius: var(--radius);
  transition: color var(--duration) var(--ease);
  position: relative;
}

.main-nav a:hover,
.main-nav a.active {
  color: var(--accent);
}

.main-nav a.active::after {
  content: "";
  position: absolute;
  left: 50%;
  bottom: -2px;
  transform: translateX(-50%);
  width: 20px;
  height: 2px;
  background: var(--accent);
  border-radius: 1px;
}

.header-actions {
  display: flex;
  align-items: center;
  gap: var(--space-3);
}

/* 移动端 hamburger */
.hamburger {
  display: none;
  width: 40px;
  height: 40px;
  background: transparent;
  border: 1px solid var(--border-strong);
  border-radius: var(--radius-sm);
  padding: 0;
  align-items: center;
  justify-content: center;
}

.hamburger span {
  display: block;
  width: 18px;
  height: 1.5px;
  background: var(--text);
  margin: 3px 0;
  transition: transform var(--duration) var(--ease),
              opacity var(--duration-fast) var(--ease);
}

.hamburger.open span:nth-child(1) { transform: translateY(4.5px) rotate(45deg); }
.hamburger.open span:nth-child(2) { opacity: 0; }
.hamburger.open span:nth-child(3) { transform: translateY(-4.5px) rotate(-45deg); }

/* ===========================================
   按钮
   =========================================== */
.btn {
  display: inline-flex;
  align-items: center;
  justify-content: center;
  gap: var(--space-2);
  padding: 0 var(--space-5);
  height: 44px;
  border-radius: var(--radius);
  font-size: var(--text-sm);
  font-weight: var(--weight-semibold);
  border: 1px solid transparent;
  transition: background var(--duration) var(--ease),
              border-color var(--duration) var(--ease),
              color var(--duration) var(--ease),
              transform var(--duration-fast) var(--ease);
  white-space: nowrap;
  letter-spacing: 0.02em;
}

.btn:active { transform: translateY(1px); }

.btn-primary {
  background: var(--cta);
  color: var(--cta-text);
  box-shadow: 0 6px 20px color-mix(in srgb, var(--cta) 40%, transparent);
}
.btn-primary:hover {
  background: var(--cta-hover);
  box-shadow: 0 8px 28px color-mix(in srgb, var(--cta) 55%, transparent);
}

/* 顶栏「预约诊断」— 白底品牌色实心，加阴影更突出 */
.btn-header-cta {
  background: #FFFFFF;
  color: var(--cta);
  height: 40px;
  padding: 0 var(--space-5);
  font-size: var(--text-sm);
  font-weight: var(--weight-bold);
  border-radius: var(--radius);
  box-shadow: 0 4px 14px rgba(255, 255, 255, 0.15);
}
.btn-header-cta:hover {
  background: #F0F4FF;
  color: var(--cta-hover);
  box-shadow: 0 6px 20px rgba(255, 255, 255, 0.25);
}

.btn-secondary {
  background: transparent;
  color: var(--text);
  border-color: var(--border-strong);
}
.btn-secondary:hover {
  border-color: var(--accent);
  color: var(--accent);
}

/* 顶栏「联系我们」— 实心深面背景 + 白字（不要透明） */
.btn-ghost {
  background: var(--bg-elevated);
  color: #FFFFFF;
  border: 1px solid var(--border-strong);
  height: 40px;
  padding: 0 var(--space-4);
  font-weight: var(--weight-semibold);
}
.btn-ghost:hover {
  background: var(--bg-surface);
  border-color: var(--accent);
  color: var(--accent);
}

.btn-text {
  background: transparent;
  color: var(--text);
  padding: 0 var(--space-2);
  height: auto;
  font-weight: var(--weight-medium);
}
.btn-text:hover { color: var(--accent); }
.btn-text .arrow {
  display: inline-block;
  transition: transform var(--duration) var(--ease);
}
.btn-text:hover .arrow { transform: translateX(4px); }

/* ===========================================
   Hero 首屏 — 居中布局（对标 tryprofound）
   =========================================== */
.hero {
  position: relative;
  padding: calc(var(--header-height) + var(--space-9)) 0 0;
  overflow: hidden;
  min-height: 100vh;
  display: flex;
  flex-direction: column;
}

/* ===========================================
   6 套背景特效（开发期可切换）
   =========================================== */
.bg-effects {
  position: absolute;
  inset: 0;
  pointer-events: none;
  z-index: 0;
  overflow: hidden;
}

.fx {
  position: absolute;
  inset: 0;
  display: none;
  pointer-events: none;
}

/* 用 body[data-fx] 决定哪一层显示 */
body[data-fx="aurora"] .fx-aurora,
body[data-fx="neural"] .fx-neural,
body[data-fx="waves"] .fx-waves,
body[data-fx="spotlight"] .fx-spotlight,
body[data-fx="stars"] .fx-stars,
body[data-fx="grid"] .fx-grid {
  display: block;
}

/* ----- 1. Aurora 流动渐变球 ----- */
.aurora-blob {
  position: absolute;
  width: 600px;
  height: 600px;
  border-radius: 50%;
  filter: blur(90px);
  opacity: 0.35;
  will-change: transform;
}
.aurora-blob-1 {
  background: var(--accent);
  top: -200px;
  left: -150px;
  animation: aurora-1 9s ease-in-out infinite alternate;
}
.aurora-blob-2 {
  background: var(--brand);
  top: 20%;
  right: -200px;
  animation: aurora-2 11s ease-in-out infinite alternate;
}
.aurora-blob-3 {
  background: var(--accent);
  bottom: -250px;
  left: 30%;
  animation: aurora-3 10s ease-in-out infinite alternate;
  opacity: 0.28;
}
@keyframes aurora-1 {
  to { transform: translate(420px, 260px) scale(1.3); }
}
@keyframes aurora-2 {
  to { transform: translate(-380px, -180px) scale(0.75); }
}
@keyframes aurora-3 {
  to { transform: translate(260px, -300px) scale(1.15); }
}

/* ----- 3. Waves 信号波扩散 ----- */
.fx-waves { display: none; }
.wave-ring {
  position: absolute;
  top: 50%;
  left: 50%;
  width: 200px;
  height: 200px;
  margin-top: -100px;
  margin-left: -100px;
  border: 1.5px solid var(--accent);
  border-radius: 50%;
  opacity: 0;
  animation: wave-emit 6s ease-out infinite;
}
.wave-ring:nth-child(2) { animation-delay: 1.5s; }
.wave-ring:nth-child(3) { animation-delay: 3s; }
.wave-ring:nth-child(4) { animation-delay: 4.5s; }
@keyframes wave-emit {
  0%   { transform: scale(0); opacity: 0.6; }
  100% { transform: scale(8); opacity: 0; }
}

/* ----- 4. Spotlight 鼠标跟随聚光灯 ----- */
.fx-spotlight {
  background: radial-gradient(
    circle 480px at var(--mx, 50%) var(--my, 30%),
    color-mix(in srgb, var(--accent) 14%, transparent) 0%,
    transparent 70%
  );
  transition: background 250ms linear;
}

/* ----- 6. Grid 网格脉冲 ----- */
.fx-grid {
  background-image:
    linear-gradient(rgba(255, 255, 255, 0.04) 1px, transparent 1px),
    linear-gradient(90deg, rgba(255, 255, 255, 0.04) 1px, transparent 1px);
  background-size: 60px 60px;
  mask-image: radial-gradient(ellipse 80% 70% at 50% 30%, #000 25%, transparent 75%);
}
.grid-pulse {
  position: absolute;
  width: 6px;
  height: 6px;
  background: var(--accent);
  border-radius: 50%;
  box-shadow: 0 0 16px var(--accent);
  opacity: 0;
  animation: grid-pulse 4s ease-out infinite;
}
.grid-pulse-1 { top: 25%; left: 18%; animation-delay: 0s; }
.grid-pulse-2 { top: 55%; left: 65%; animation-delay: 1.3s; }
.grid-pulse-3 { top: 35%; left: 80%; animation-delay: 2.6s; }
@keyframes grid-pulse {
  0%, 100% { opacity: 0; transform: scale(0.6); }
  20% { opacity: 1; transform: scale(1.4); }
  40% { opacity: 0; transform: scale(0.6); }
}

/* ----- 2 & 5: 神经网络 / 星尘（canvas，JS 绘制） ----- */
.fx-neural,
.fx-stars {
  width: 100%;
  height: 100%;
}

.hero-center {
  position: relative;
  z-index: var(--z-base);
  display: flex;
  flex-direction: column;
  align-items: center;
  text-align: center;
  flex: 1;
  justify-content: center;
  padding: var(--space-7) var(--space-5);
}

.hero-eyebrow {
  display: inline-flex;
  align-items: center;
  gap: var(--space-2);
  padding: var(--space-2) var(--space-4);
  border: 1px solid var(--border-strong);
  border-radius: var(--radius-full);
  font-size: var(--text-xs);
  color: var(--text-muted);
  margin-bottom: var(--space-7);
  background: rgba(31, 41, 55, 0.5);
  backdrop-filter: blur(8px);
}

.hero-eyebrow .dot {
  width: 6px;
  height: 6px;
  background: var(--accent);
  border-radius: 50%;
  box-shadow: 0 0 10px var(--accent);
  animation: pulse 2s ease-in-out infinite;
}

@keyframes pulse {
  0%, 100% { opacity: 1; }
  50% { opacity: 0.35; }
}

/* 主标题（按客户批注调整后）
   结构：主行（让您的品牌占领 AI [第一]推荐位）+ 平台动态行（独立一行）
*/
.hero-title {
  line-height: 1.15;
  font-weight: var(--weight-bold);
  letter-spacing: -0.02em;
  margin: 0 0 var(--space-6);
  color: var(--text);
}

.title-line {
  display: block;
}

.title-line + .title-line {
  margin-top: clamp(14px, 1.8vw, 28px);
}

/* 主行 — 整句标题，字号比之前收小 */
.title-line-main {
  font-size: clamp(32px, 4.8vw, 68px);
  color: var(--text);
}

/* "第一" 蓝色凸显（不是渐变 - 客户原图也是单色蓝） */
.title-highlight {
  color: var(--accent);
  font-weight: var(--weight-bold);
}

/* 平台动态行 — 独立一行，比主行小，让 Logo 是辅助不抢戏 */
.title-line-rotator {
  font-size: clamp(22px, 2.8vw, 38px);
  min-height: 1.2em;
  color: var(--text-muted);
}

/* 渐变高亮文字 — 保留以备其他场景 */
.gradient-text {
  background: linear-gradient(135deg, var(--grad-from) 0%, var(--grad-mid) 35%, var(--grad-to) 100%);
  -webkit-background-clip: text;
  background-clip: text;
  color: transparent;
  -webkit-text-fill-color: transparent;
}

/* 平台轮换槽 — Logo + 名字，无背景 */
.platform-rotator {
  display: inline-flex;
  align-items: center;
  gap: var(--space-2);
  position: relative;
  transition: opacity var(--duration) var(--ease), transform var(--duration) var(--ease);
}

.platform-rotator.swapping {
  opacity: 0;
  transform: translateY(4px);
}

.platform-icon {
  width: 1em;
  height: 1em;
  display: inline-block;
  flex-shrink: 0;
  object-fit: contain;
  border-radius: 0.18em;
}

.platform-rotator .platform-name {
  display: inline-block;
  font-weight: var(--weight-semibold);
  color: var(--text);
}

.hero-subtitle {
  font-size: clamp(16px, 1.4vw, 20px);
  color: var(--text-muted);
  line-height: var(--leading-snug);
  margin: 0 0 var(--space-7);
  max-width: 640px;
}

.hero-ctas {
  display: flex;
  align-items: center;
  justify-content: center;
  gap: var(--space-3);
  flex-wrap: wrap;
}

.btn-lg {
  height: 52px;
  padding: 0 var(--space-6);
  font-size: var(--text-base);
}

/* AI 平台 Logo 跑马灯 — Hero 底部全宽
   去掉分割线，加厚高度，Logo 放大到 44px
*/
.platform-marquee {
  position: relative;
  z-index: var(--z-base);
  padding: var(--space-7) 0 var(--space-6);
  margin-top: auto;
}

.marquee-track {
  display: flex;
  gap: var(--space-9);
  animation: marquee 38s linear infinite;
  align-items: center;
  width: max-content;
}

.marquee-viewport {
  overflow: hidden;
  mask-image: linear-gradient(90deg, transparent, #000 6%, #000 94%, transparent);
}

.platform-marquee:hover .marquee-track {
  animation-play-state: paused;
}

@keyframes marquee {
  from { transform: translateX(0); }
  to { transform: translateX(-50%); }
}

.platform-logo {
  display: inline-flex;
  align-items: center;
  gap: var(--space-3);
  color: var(--text-muted);
  font-size: var(--text-lg);
  font-weight: var(--weight-medium);
  opacity: 0.65;
  transition: opacity var(--duration) var(--ease);
  flex-shrink: 0;
  white-space: nowrap;
}

.platform-logo:hover { opacity: 1; }

.platform-logo img {
  height: 44px;
  width: 44px;
  object-fit: contain;
}

/* ===========================================
   章节通用样式
   =========================================== */
.section-head {
  text-align: center;
  max-width: 720px;
  margin: 0 auto var(--space-8);
}

.section-eyebrow {
  display: inline-block;
  font-size: var(--text-xs);
  font-family: var(--font-mono);
  color: var(--accent);
  letter-spacing: 0.2em;
  margin-bottom: var(--space-4);
}

.section-title {
  font-size: clamp(28px, 3.6vw, 48px);
  line-height: var(--leading-tight);
  font-weight: var(--weight-bold);
  margin: 0 0 var(--space-4);
  letter-spacing: -0.01em;
}

.section-lead {
  font-size: var(--text-lg);
  color: var(--text-muted);
  margin: 0;
  line-height: var(--leading-snug);
}

/* ===========================================
   系统演示段
   =========================================== */
.showcase-section {
  padding: var(--space-9) 0;
}

.showcase-stage {
  max-width: 1100px;
  margin: 0 auto;
}

.showcase-frame {
  position: relative;
  aspect-ratio: 3 / 2;
  border-radius: var(--radius-md);
  overflow: hidden;
  background: var(--bg-elevated);
  border: 1px solid var(--border-strong);
  box-shadow: var(--shadow-lg);
}

.showcase-slide {
  position: absolute;
  inset: 0;
  opacity: 0;
  transition: opacity 500ms var(--ease);
}

.showcase-slide.active {
  opacity: 1;
}

.showcase-slide img {
  width: 100%;
  height: 100%;
  object-fit: cover;
  object-position: center center;
  image-rendering: -webkit-optimize-contrast;
  image-rendering: crisp-edges;
}

.showcase-frame::before {
  content: "";
  position: absolute;
  top: 0;
  left: 0;
  right: 0;
  height: 32px;
  background: linear-gradient(180deg, rgba(15, 23, 42, 0.95), rgba(15, 23, 42, 0.4));
  z-index: 2;
  pointer-events: none;
}

.showcase-frame::after {
  content: "● ● ●";
  position: absolute;
  top: 8px;
  left: 14px;
  color: var(--text-dim);
  font-size: 10px;
  letter-spacing: 4px;
  z-index: 3;
  pointer-events: none;
}

.showcase-dots {
  display: flex;
  justify-content: center;
  gap: var(--space-2);
  margin-top: var(--space-5);
}

.showcase-dot {
  width: 32px;
  height: 3px;
  background: var(--border-strong);
  border: none;
  border-radius: 2px;
  cursor: pointer;
  padding: 0;
  transition: background var(--duration) var(--ease);
}

.showcase-dot.active {
  background: var(--accent);
}

.showcase-dot:hover {
  background: var(--text-muted);
}

/* ===========================================
   背景特效切换面板（QA 工具 — 上线前删除）
   =========================================== */
.fx-switcher {
  position: fixed;
  right: 16px;
  bottom: 16px;
  z-index: var(--z-modal);
  background: rgba(10, 15, 26, 0.92);
  border: 1px solid #2D3D62;
  border-radius: 12px;
  padding: 10px 12px;
  backdrop-filter: blur(20px);
  box-shadow: 0 12px 32px rgba(0, 0, 0, 0.5);
  display: flex;
  align-items: center;
  gap: 10px;
  font-family: var(--font-sans);
  user-select: none;
}

.fx-switcher-label {
  font-family: var(--font-mono);
  font-size: 10px;
  letter-spacing: 0.15em;
  color: #64748B;
  flex-shrink: 0;
}

.fx-switcher-buttons {
  display: flex;
  gap: 6px;
  flex-wrap: wrap;
}

.fx-btn {
  display: inline-flex;
  flex-direction: column;
  align-items: center;
  gap: 4px;
  padding: 8px 10px;
  background: rgba(255, 255, 255, 0.04);
  border: 1px solid rgba(255, 255, 255, 0.1);
  border-radius: 6px;
  cursor: pointer;
  color: #F8FAFC;
  transition: background 150ms, border-color 150ms, transform 150ms;
  min-width: 52px;
}

.fx-btn:hover {
  background: rgba(255, 255, 255, 0.08);
  transform: translateY(-1px);
}

.fx-btn.active {
  border-color: #2F66FF;
  background: rgba(47, 102, 255, 0.18);
}

.fx-btn-icon {
  font-size: 16px;
  line-height: 1;
}

.fx-btn-name {
  font-size: 11px;
  font-weight: 500;
}

@media (max-width: 768px) {
  .fx-switcher {
    right: 8px;
    bottom: 8px;
    padding: 6px 8px;
    gap: 6px;
  }
  .fx-switcher-label { display: none; }
  .fx-btn { padding: 6px 8px; min-width: 44px; }
  .fx-btn-name { font-size: 10px; }
}

/* ===========================================
   响应式
   =========================================== */
@media (max-width: 768px) {
  .main-nav,
  .header-actions .btn-ghost,
  .header-actions .btn-secondary {
    display: none;
  }
  .hamburger {
    display: inline-flex;
  }
  .brand img { height: 36px; }

  .hero {
    min-height: auto;
    padding: calc(var(--header-height) + var(--space-7)) 0 0;
  }
  .hero-center {
    padding: var(--space-5);
  }
  .hero-title {
    font-size: clamp(32px, 9vw, 52px);
  }
  .hero-subtitle {
    font-size: var(--text-base);
  }
  .hero-ctas .btn {
    flex: 1;
    min-width: 0;
    padding: 0 var(--space-4);
  }
  .platform-logo img { height: 24px; }
  .marquee-track { gap: var(--space-6); }
  .platform-marquee { padding: var(--space-5) 0; }

  .showcase-section { padding: var(--space-7) 0; }
}

</style>
</head>

  <script>
/* 智优康赛首页交互
   依赖：无第三方库（纯原生 JS）
*/

(function () {
  'use strict';

  /* ============================================
     0. 配色主题切换（QA 工具 · 上线前删除）
     ============================================ */
  // 客户已拍板用 M
  document.documentElement.setAttribute('data-theme', 'M');

  /* ============================================
     背景特效管理（6 套 + 无）
     ============================================ */
  const FX_KEY = 'zykys-fx';
  const fxBtns = document.querySelectorAll('.fx-btn');
  let neuralRAF = null;
  let starsRAF = null;
  let spotlightHandler = null;

  function stopAllAnimations() {
    if (neuralRAF) { cancelAnimationFrame(neuralRAF); neuralRAF = null; }
    if (starsRAF) { cancelAnimationFrame(starsRAF); starsRAF = null; }
    if (spotlightHandler) {
      document.removeEventListener('mousemove', spotlightHandler);
      spotlightHandler = null;
    }
  }

  function applyFx(name) {
    stopAllAnimations();
    document.body.setAttribute('data-fx', name);
    if (name === 'neural') startNeural();
    if (name === 'stars') startStars();
    if (name === 'spotlight') startSpotlight();
    fxBtns.forEach((b) => b.classList.toggle('active', b.dataset.fx === name));
    localStorage.setItem(FX_KEY, name);
  }

  /* ---- 鼠标聚光灯（设 CSS 变量） ---- */
  function startSpotlight() {
    spotlightHandler = (e) => {
      document.documentElement.style.setProperty('--mx', e.clientX + 'px');
      document.documentElement.style.setProperty('--my', e.clientY + 'px');
    };
    document.addEventListener('mousemove', spotlightHandler);
  }

  /* ---- 神经网络节点 + 连线
     - 节点数 70
     - 鼠标 180px 范围内的节点会被"吸引"靠拢（不是全部）
     - 远处节点保持自然漂浮
  ---- */
  function startNeural() {
    const canvas = document.getElementById('canvas-neural');
    if (!canvas) return;
    const ctx = canvas.getContext('2d');
    const accent = getCSSColor('--accent');
    let W, H, nodes;
    const NODE_COUNT = 70;
    const LINK_DIST = 150;
    const ATTRACT_DIST = 180;
    const ATTRACT_FORCE = 0.05;
    const DAMPING = 0.985;
    const MAX_SPEED = 1.2;
    let mouseX = -9999, mouseY = -9999;

    function resize() {
      const dpr = Math.min(window.devicePixelRatio || 1, 2);
      const rect = canvas.getBoundingClientRect();
      canvas.width = rect.width * dpr;
      canvas.height = rect.height * dpr;
      ctx.setTransform(dpr, 0, 0, dpr, 0, 0);
      canvas.style.width = rect.width + 'px';
      canvas.style.height = rect.height + 'px';
      W = rect.width; H = rect.height;
    }
    function init() {
      nodes = Array.from({ length: NODE_COUNT }, () => ({
        x: Math.random() * W,
        y: Math.random() * H,
        vx: (Math.random() - 0.5) * 0.3,
        vy: (Math.random() - 0.5) * 0.3,
        r: 1.2 + Math.random() * 1.6
      }));
    }
    function onMouseMove(e) {
      // 监听全局鼠标位置（Hero 范围内有效）
      const rect = canvas.getBoundingClientRect();
      mouseX = e.clientX - rect.left;
      mouseY = e.clientY - rect.top;
    }
    function onMouseLeave() {
      mouseX = -9999; mouseY = -9999;
    }
    function step() {
      ctx.clearRect(0, 0, W, H);

      // 更新位置：鼠标附近的节点被吸引，远的保持自然漂浮
      nodes.forEach((n) => {
        const dxm = mouseX - n.x;
        const dym = mouseY - n.y;
        const distM = Math.sqrt(dxm * dxm + dym * dym);
        if (distM < ATTRACT_DIST && distM > 1) {
          // 吸引力：距离越近力越强
          const factor = (1 - distM / ATTRACT_DIST) * ATTRACT_FORCE;
          n.vx += (dxm / distM) * factor;
          n.vy += (dym / distM) * factor;
        }
        // 阻尼防止越跑越快
        n.vx *= DAMPING;
        n.vy *= DAMPING;
        // 阻尼后给个最小自然漂浮，避免完全静止
        if (Math.abs(n.vx) < 0.04) n.vx += (Math.random() - 0.5) * 0.08;
        if (Math.abs(n.vy) < 0.04) n.vy += (Math.random() - 0.5) * 0.08;
        // 限速
        const speed = Math.sqrt(n.vx * n.vx + n.vy * n.vy);
        if (speed > MAX_SPEED) {
          n.vx = (n.vx / speed) * MAX_SPEED;
          n.vy = (n.vy / speed) * MAX_SPEED;
        }
        // 应用位移
        n.x += n.vx;
        n.y += n.vy;
        // 边界反弹
        if (n.x < 0) { n.x = 0; n.vx *= -1; }
        if (n.x > W) { n.x = W; n.vx *= -1; }
        if (n.y < 0) { n.y = 0; n.vy *= -1; }
        if (n.y > H) { n.y = H; n.vy *= -1; }
      });

      // 连线
      for (let i = 0; i < nodes.length; i++) {
        for (let j = i + 1; j < nodes.length; j++) {
          const dx = nodes[i].x - nodes[j].x;
          const dy = nodes[i].y - nodes[j].y;
          const dist = Math.sqrt(dx * dx + dy * dy);
          if (dist < LINK_DIST) {
            const a = (1 - dist / LINK_DIST) * 0.4;
            ctx.strokeStyle = `${accent}${Math.floor(a * 255).toString(16).padStart(2, '0')}`;
            ctx.lineWidth = 1;
            ctx.beginPath();
            ctx.moveTo(nodes[i].x, nodes[i].y);
            ctx.lineTo(nodes[j].x, nodes[j].y);
            ctx.stroke();
          }
        }
      }

      // 画节点（鼠标附近的高亮）
      nodes.forEach((n) => {
        const dxm = n.x - mouseX, dym = n.y - mouseY;
        const distM = Math.sqrt(dxm * dxm + dym * dym);
        const boost = distM < ATTRACT_DIST ? (1 - distM / ATTRACT_DIST) * 2 : 0;
        ctx.fillStyle = accent;
        ctx.globalAlpha = 0.5 + boost * 0.5;
        ctx.beginPath();
        ctx.arc(n.x, n.y, n.r + boost, 0, Math.PI * 2);
        ctx.fill();
      });
      ctx.globalAlpha = 1;
      neuralRAF = requestAnimationFrame(step);
    }
    resize(); init();
    // 监听整个文档的鼠标位置（不止 canvas 区，因为 canvas pointer-events:none）
    document.addEventListener('mousemove', onMouseMove);
    document.addEventListener('mouseleave', onMouseLeave);
    window.addEventListener('resize', () => { resize(); init(); });
    step();
  }

  /* ---- 星尘漂浮（加密 + 加速） ---- */
  function startStars() {
    const canvas = document.getElementById('canvas-stars');
    if (!canvas) return;
    const ctx = canvas.getContext('2d');
    let W, H, stars;
    const COUNT = 220;
    function resize() {
      const rect = canvas.getBoundingClientRect();
      canvas.width = rect.width;
      canvas.height = rect.height;
      W = rect.width; H = rect.height;
    }
    function init() {
      stars = Array.from({ length: COUNT }, () => ({
        x: Math.random() * W,
        y: Math.random() * H,
        r: 0.4 + Math.pow(Math.random(), 2) * 2.4,
        a: Math.random() * Math.PI * 2,
        ds: 0.01 + Math.random() * 0.025,             // 闪烁慢一点
        vy: 0.05 + Math.random() * 0.25,              // 下落速度 0.05-0.3（雪花漂落感）
        vx: (Math.random() - 0.5) * 0.12              // 轻微左右漂移
      }));
    }
    function step() {
      ctx.clearRect(0, 0, W, H);
      stars.forEach((s) => {
        s.y += s.vy;
        s.x += s.vx;
        s.a += s.ds;
        // 边界处理
        if (s.y > H + 5) { s.y = -5; s.x = Math.random() * W; }
        if (s.x < -5) s.x = W + 5;
        if (s.x > W + 5) s.x = -5;
        const alpha = 0.4 + Math.sin(s.a) * 0.5;
        // 大的星星加发光
        if (s.r > 1.5) {
          ctx.shadowColor = '#FFFFFF';
          ctx.shadowBlur = 6;
        } else {
          ctx.shadowBlur = 0;
        }
        ctx.fillStyle = `rgba(255, 255, 255, ${Math.max(0, alpha)})`;
        ctx.beginPath();
        ctx.arc(s.x, s.y, s.r, 0, Math.PI * 2);
        ctx.fill();
      });
      ctx.shadowBlur = 0;
      starsRAF = requestAnimationFrame(step);
    }
    resize(); init();
    window.addEventListener('resize', () => { resize(); init(); });
    step();
  }

  function getCSSColor(varName) {
    const s = getComputedStyle(document.documentElement).getPropertyValue(varName).trim();
    return s || '#2F66FF';
  }

  fxBtns.forEach((btn) => {
    btn.addEventListener('click', () => applyFx(btn.dataset.fx));

    ];

    const iconEl = platformRotator.querySelector('.platform-icon');
    const nameEl = platformRotator.querySelector('.platform-name');
    let idx = 0;

    const rotate = () => {
      idx = (idx + 1) % platforms.length;
      const [name, icon] = platforms[idx];

      // 淡出 → 换内容 → 淡入
      platformRotator.classList.add('swapping');
      setTimeout(() => {
        nameEl.textContent = name;
        if (icon) {
          iconEl.src = icon;
          iconEl.style.display = '';
        } else {
          iconEl.style.display = 'none';
        }
        platformRotator.classList.remove('swapping');
      }, 200);
    };

    setInterval(rotate, 2800);
  }

  /* ============================================
     3. Hero 系统截图轮播
     ============================================ */
  const showcase = document.querySelector('.showcase-frame');
  if (showcase) {
    const slides = Array.from(showcase.querySelectorAll('.showcase-slide'));
    const dots = Array.from(document.querySelectorAll('.showcase-dot'));
    let active = 0;
    let timer = null;
    const INTERVAL = 5000;

    const goTo = (i) => {
      slides[active].classList.remove('active');
      dots[active]?.classList.remove('active');
      active = (i + slides.length) % slides.length;
      slides[active].classList.add('active');
      dots[active]?.classList.add('active');
    };

    const next = () => goTo(active + 1);

    const start = () => {
      stop();
      timer = setInterval(next, INTERVAL);
    };
    const stop = () => {
      if (timer) {
        clearInterval(timer);
        timer = null;
      }
    };

    dots.forEach((dot, i) => {
      dot.addEventListener('click', () => {
        goTo(i);
        start();
      });
    });

    // 悬停暂停
    showcase.addEventListener('mouseenter', stop);
    showcase.addEventListener('mouseleave', start);

    // 用 IntersectionObserver 只在可视时跑
    if ('IntersectionObserver' in window) {
      const io = new IntersectionObserver((entries) => {
        entries.forEach((e) => {
          if (e.isIntersecting) start();
          else stop();
        });
      }, { threshold: 0.2 });
      io.observe(showcase);
    } else {
      start();
    }
  }

  /* ============================================
     4. 移动端 Hamburger（占位，后续接入侧边抽屉）
     ============================================ */
  const hamburger = document.querySelector('.hamburger');
  if (hamburger) {
    hamburger.addEventListener('click', () => {
      hamburger.classList.toggle('open');
      // 抽屉逻辑后续在 mobile-nav.js 加
    });
  }
})();

</script>
